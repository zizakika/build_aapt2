name: Build AAPT2 Binary Proxy for ARM64 & x86

on:
  workflow_dispatch:

jobs:
  # --- BUILD CHO LINUX ARM64 (CROSS-COMPILE) ---
  build-linux-arm64:
    name: Build for Linux ARM64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt công cụ biên dịch chéo sang ARM64
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Biên dịch sang Linux ARM64
      run: |
        aarch64-linux-gnu-gcc aapt2_proxy.c -o aapt2-linux-arm64
        chmod +x aapt2-linux-arm64

    - name: Tải lên Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aapt2-linux-arm64-binary
        path: aapt2-linux-arm64
