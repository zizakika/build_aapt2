name: Build AAPT2 Binary Proxy for ARM64 & x86

on:
  workflow_dispatch:

jobs:
  # --- BUILD CHO LINUX ARM64 (CROSS-COMPILE) ---
  build-linux-arm64:
    name: Build for Linux ARM64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt công cụ biên dịch chéo sang ARM64
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Thiết lập QEMU để giả lập môi trường ARM64
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Biên dịch trực tiếp trong Container Ubuntu ARM64 chính thức
      run: |
        # Sử dụng image chính thức arm64v8/ubuntu để đảm bảo luôn pull thành công
        docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/ws arm64v8/ubuntu:22.04 /bin/bash -c "
          apt-get update && 
          apt-get install -y gcc && 
          gcc /ws/aapt2_proxy.c -o /ws/aapt2-linux-arm64
        "

    - name: Tải lên Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aapt2-linux-arm64-binary
        path: aapt2-linux-arm64
